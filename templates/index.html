<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimPy Trafik Simülasyonu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🚦 SimPy &amp; CSV Entegre Kavşak Simülasyonu</h1>

        <div class="controls">
            <div class="control-group">
                <label>Kavşak</label>
                <select id="junctionSelect">
                    <option value="1">Kavşak 1</option>
                    <option value="2">Kavşak 2</option>
                    <option value="3">Kavşak 3</option>
                    <option value="4">Kavşak 4</option>
                </select>
            </div>
            <div class="control-group">
                <label>Kapasite: <span id="capVal" class="cap-label">2</span></label>
                <input type="range" id="capSlider" min="1" max="6" value="2">
            </div>
            <div class="control-group">
                <label>Simülasyon Hızı: <span id="speedVal" class="cap-label">1×</span></label>
                <input type="range" id="speedSlider" min="1" max="8" value="1">
            </div>
            <button id="simBtn" onclick="fetchSimulation()">▶ Simülasyonu Başlat</button>
        </div>

        <div class="stats">
            <div class="stat-box stat-time">
                <div class="stat-label">Simüle Edilen Saat</div>
                <div class="stat-value" id="timeVal">0.00</div>
            </div>
            <div class="stat-box stat-queue">
                <div class="stat-label">Kuyruk</div>
                <div class="stat-value" id="queueVal">0</div>
            </div>
            <div class="stat-box stat-pass">
                <div class="stat-label">Geçen Araç</div>
                <div class="stat-value" id="passedVal">0</div>
            </div>
            <div class="stat-box stat-wait">
                <div class="stat-label">Ort. Bekleme (dk)</div>
                <div class="stat-value" id="waitVal">—</div>
            </div>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>

        <canvas id="simCanvas" width="812" height="210"></canvas>

        <div class="status-row">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Simülasyon bekleniyor.</span>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> Kuyrukta</div>
            <div class="legend-item"><div class="legend-dot" style="background:#4f8ef7"></div> Kavşakta</div>
            <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> Geçti</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
